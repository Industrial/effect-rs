version: 2
updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
    rebase-strategy: auto
  # Keep Cargo dependencies up to date
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps)"
    rebase-strategy: auto
    # Group all patch and minor Cargo updates into a single PR
    groups:
      patch-updates:
        update-types:
          - patch
      minor-updates:
        update-types:
          - minor
