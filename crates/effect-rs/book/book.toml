[book]
title = "A Playful Guide to Typed Effects in Rust"
authors = ["effect-rs contributors"]
description = "Learn to build composable, testable async programs with effect-rs"
language = "en"
multilingual = false

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "coal"
git-repository-url = "https://github.com/your-org/effect-rs"
edit-url-template = "https://github.com/your-org/effect-rs/edit/main/crates/effect-rs/book/{path}"

[output.html.playground]
editable = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
use-hierarchical-titles = true
